repos:
  # Black - formatter
  - repo: https://github.com/psf/black
    rev: 25.1.0   # última versão estável
    hooks:
      - id: black
        language_version: python3

  # Ruff - lint e organização de imports
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.9    # última versão estável
    hooks:
      - id: ruff
        args: [--fix]   # já tenta corrigir automaticamente
      - id: ruff-format # (opcional) usa Ruff como formatter extra

  # Mypy - type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-requests]  # adiciona stubs se precisar

  # Commitlint - valida mensagens de commit (Conventional Commits)
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
